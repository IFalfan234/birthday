<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown to Your Birthday</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/entry-countdown.css">
</head>
<body>
    <div class="entry-wrapper">
        <div class="entry-card">
            <span class="entry-badge">Special Countdown</span>
            <h1>Countdown to Our Special Day</h1>
            <p>
                Sebelum masuk ke halaman utama, aku ingin kamu menikmati momen menunggu hari istimewa ini.
                Saat hitungan mundur selesai, halaman utama akan terbuka dengan semua surprise yang sudah aku siapkan.
            </p>

            <div class="entry-countdown">
                <div class="entry-box">
                    <h2 id="entry-days">00</h2>
                    <span>Days</span>
                </div>
                <div class="entry-box">
                    <h2 id="entry-hours">00</h2>
                    <span>Hours</span>
                </div>
                <div class="entry-box">
                    <h2 id="entry-minutes">00</h2>
                    <span>Minutes</span>
                </div>
                <div class="entry-box">
                    <h2 id="entry-seconds">00</h2>
                    <span>Seconds</span>
                </div>
            </div>
        </div>
    </div>

    <script src="js/entry-countdown.js"></script>
</body>
</html>
